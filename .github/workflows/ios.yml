name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ios
            arch: aarch64
            runs: macos-latest
            target: aarch64-apple-ios
    runs-on: ${{ matrix.runs }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          rustup target add ${{ matrix.target }}
          cargo install cargo-mobile2

      - name: Generate icons
        run: |
          if ls gen/apple/Assets.xcassets/AppIcon.appiconset/*.png >/dev/null 2>&1; then
            echo "Icons exist, skipping"
            exit 0
          fi
          cargo install tauri-cli
          mkdir -p src-tauri
          echo '{"bundle":{"icon":["icons/32x32.png","icons/128x128.png","icons/128x128@2x.png","icons/icon.icns","icons/icon.ico"]}}' > src-tauri/tauri.conf.json
          cargo tauri icon ./app-icon.png
          rsync -av --remove-source-files src-tauri/icons/ios/ gen/apple/Assets.xcassets/AppIcon.appiconset || true

      - name: Prepare project for CI (no Apple account)
        run: |
          # Remove development team references (CI has no Apple developer account)
          sed -i '' '/development-team/d' mobile.toml
          sed -i '' '/DEVELOPMENT_TEAM/d' gen/apple/project.yml
          sed -i '' '/development-team/d' Cargo.toml
          # Fix GCC_PREPROCESSOR_DEFINITIONS which may be unset in CI
          sed -i '' 's/\${GCC_PREPROCESSOR_DEFINITIONS:?}/\${GCC_PREPROCESSOR_DEFINITIONS:-}/g' gen/apple/project.yml
          # Cargo builds to repo-root target/, linker looks in gen/apple/target/
          ln -sf "$(pwd)/target" gen/apple/target

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          mkdir -p gen/apple/assets
          xcodegen generate --spec gen/apple/project.yml --project gen/apple

          # Strip signing from generated pbxproj
          PROJ="gen/apple/ren-rs-refactor.xcodeproj/project.pbxproj"
          sed -i '' 's/DEVELOPMENT_TEAM = "[^"]*";/DEVELOPMENT_TEAM = "";/g' "$PROJ"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJ"
          sed -i '' '/CODE_SIGN_IDENTITY/d' "$PROJ"
          sed -i '' '/CODE_SIGN_ENTITLEMENTS/d' "$PROJ"
          sed -i '' '/PROVISIONING_PROFILE_SPECIFIER/d' "$PROJ"

      - name: Patch xcodebuild (strip -allowProvisioningUpdates, inject ad-hoc signing)
        run: |
          XCB=$(xcode-select -p)/usr/bin/xcodebuild
          sudo cp "$XCB" "${XCB}.real"
          sudo tee "$XCB" > /dev/null << 'WRAPPER'
          #!/bin/bash
          args=()
          for a in "$@"; do
            case "$a" in
              -allowProvisioningUpdates|-allowProvisioningDeviceRegistration) ;;
              *) args+=("$a") ;;
            esac
          done
          exec "${0}.real" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM= \
            "${args[@]}"
          WRAPPER
          sudo chmod +x "$XCB"

      - name: Build
        run: |
          set -o pipefail
          cargo apple build --release --verbose 2>&1 | tee build.log
        timeout-minutes: 30

      - name: Restore xcodebuild
        if: always()
        run: |
          XCB=$(xcode-select -p)/usr/bin/xcodebuild
          if [ -f "${XCB}.real" ]; then sudo mv "${XCB}.real" "$XCB"; fi

      - name: Package IPA
        run: |
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "*.app" -type d 2>/dev/null | head -n 1)
          if [ -z "$APP_PATH" ]; then APP_PATH=$(find . -name "*.app" -type d 2>/dev/null | head -n 1); fi
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            tail -40 build.log
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ren-rs-refactor.unsigned.ipa Payload
          ls -lh ren-rs-refactor.unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v7
        with:
          name: Bundle-${{ matrix.os }}-${{ matrix.arch }}
          path: ren-rs-refactor.unsigned.ipa
          if-no-files-found: error
